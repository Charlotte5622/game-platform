<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 联机游戏平台</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <style>
    /* ===== 首页加载动画（React 挂载后自动消失） ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    .app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f23;
      z-index: 9999;
    }

    .app-loader-logo {
      font-size: 64px;
      margin-bottom: 32px;
      animation: loaderFloat 2s ease-in-out infinite;
    }

    .app-loader-bar-wrap {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    /* indeterminate 进度条：滑块来回移动，不跳变 */
    .app-loader-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #6c5ce7, #a29bfe, #6c5ce7);
      background-size: 200% 100%;
      border-radius: 4px;
      animation: loaderSlide 1.5s ease-in-out infinite, loaderShimmer 1.5s linear infinite;
    }

    .app-loader-text {
      color: rgba(255,255,255,0.5);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* 省略号动画：用三个 span + opacity 交错，兼容所有浏览器 */
    .app-loader-dots span {
      animation: loaderDotFade 1.5s ease-in-out infinite;
    }
    .app-loader-dots span:nth-child(2) { animation-delay: 0.3s; }
    .app-loader-dots span:nth-child(3) { animation-delay: 0.6s; }

    @keyframes loaderFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 滑块从左到右再回来，不归零 */
    @keyframes loaderSlide {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(150%); }
      100% { transform: translateX(-100%); }
    }

    @keyframes loaderShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes loaderDotFade {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- 加载动画：React 挂载后自动被替换 -->
    <div class="app-loader">
      <div class="app-loader-logo">🎮</div>
      <div class="app-loader-bar-wrap">
        <div class="app-loader-bar"></div>
      </div>
      <div class="app-loader-text">正在加载<span class="app-loader-dots"><span>.</span><span>.</span><span>.</span></span></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
